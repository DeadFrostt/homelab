apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: authentik
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: authentik
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow RAC outpost to reach Authentik server
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rac-to-server
  namespace: authentik
spec:
  podSelector:
    matchLabels:
      app: authentik-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: rac-outpost
      ports:
        - protocol: TCP
          port: 9000
---
# Allow Authentik server to reach Postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-server-to-postgres
  namespace: authentik
spec:
  podSelector:
    matchLabels:
      app: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: authentik-server
        - podSelector:
            matchLabels:
              app: authentik-worker
      ports:
        - protocol: TCP
          port: 5432
---
# Authentik server ingress + egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-authentik-server
  namespace: authentik
spec:
  podSelector:
    matchLabels:
      app: authentik-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9443
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - protocol: TCP
          port: 5432
    - {}
---
# Authentik worker egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-authentik-worker
  namespace: authentik
spec:
  podSelector:
    matchLabels:
      app: authentik-worker
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - protocol: TCP
          port: 5432
    - {}
---
# RAC outpost ingress + egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rac-outpost
  namespace: authentik
spec:
  podSelector:
    matchLabels:
      app: rac-outpost
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 4822
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: authentik-server
      ports:
        - protocol: TCP
          port: 9000
    - {}
---
# Postgres only accepts from authentik apps
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-egress
  namespace: authentik
spec:
  podSelector:
    matchLabels:
      app: postgresql
  policyTypes:
    - Egress
  egress:
    - {}

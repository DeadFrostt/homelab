apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  namespace: authentik
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: authentik-worker
  template:
    metadata:
      labels:
        app: authentik-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/goauthentik/server:2026.5.6@sha256:ed120caf710ccf82ef0026f0bc74e51615bc95ebff228a7a2d6fc60c441c3868
          args: ["worker"]
          env:
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: "authentik-pg-rw"
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-env
                  key: AUTHENTIK_SECRET_KEY
            - name: AUTHENTIK_POSTGRESQL__USER
              valueFrom:
                secretKeyRef:
                  name: authentik-env
                  key: PG_USER
            - name: AUTHENTIK_POSTGRESQL__NAME
              valueFrom:
                secretKeyRef:
                  name: authentik-env
                  key: PG_DB
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-env
                  key: PG_PASS
            - name: AUTHENTIK_REDIS__DB
              valueFrom:
                secretKeyRef:
                  name: authentik-env
                  key: AUTHENTIK_REDIS__DB
          volumeMounts:
            - name: media
              mountPath: /media
            - name: certs
              mountPath: /certs
            - name: templates
              mountPath: /templates
          resources:
            limits:
              memory: "1Gi"
              cpu: "750m"
            requests:
              memory: "256Mi"
              cpu: "50m"
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
        - name: certs
          persistentVolumeClaim:
            claimName: authentik-certs
        - name: templates
          persistentVolumeClaim:
            claimName: authentik-templates

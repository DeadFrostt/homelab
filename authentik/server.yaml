apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: authentik
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: authentik-server
  template:
    metadata:
      labels:
        app: authentik-server
      annotations:
        backup.velero.io/backup-volumes-excludes: templates
    spec:
      containers:
        - name: server
          image: ghcr.io/goauthentik/server:2026.5.3@sha256:377ee38726785f98aafc3665202ad198a366fa979b0f61c0660a9c05e3a9b1b3
          args: ["server"]
          ports:
            - containerPort: 9000
              name: http
            - containerPort: 9443
              name: https
          env:
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: "authentik-pg-rw"
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-env
                  key: AUTHENTIK_SECRET_KEY
            - name: AUTHENTIK_POSTGRESQL__USER
              valueFrom:
                secretKeyRef:
                  name: authentik-env
                  key: PG_USER
            - name: AUTHENTIK_POSTGRESQL__NAME
              valueFrom:
                secretKeyRef:
                  name: authentik-env
                  key: PG_DB
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-env
                  key: PG_PASS
            - name: AUTHENTIK_REDIS__DB
              valueFrom:
                secretKeyRef:
                  name: authentik-env
                  key: AUTHENTIK_REDIS__DB
          volumeMounts:
            - name: media
              mountPath: /media
            - name: templates
              mountPath: /templates
          readinessProbe:
            httpGet:
              path: /-/health/ready/
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /-/health/live/
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            limits:
              memory: "1280Mi"
              cpu: "750m"
            requests:
              memory: "512Mi"
              cpu: "100m"
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
        - name: templates
          persistentVolumeClaim:
            claimName: authentik-templates
---
apiVersion: v1
kind: Service
metadata:
  name: authentik-server
  namespace: authentik
spec:
  type: NodePort
  selector:
    app: authentik-server
  ports:
    - name: http
      port: 9000
      targetPort: 9000
      nodePort: 30900

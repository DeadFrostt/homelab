apiVersion: apps/v1
kind: Deployment
metadata:
  name: actual-ai
  namespace: actual-ai
  labels:
    app: actual-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actual-ai
  template:
    metadata:
      labels:
        app: actual-ai
    spec:
      hostAliases:
        - ip: 100.105.150.16
          hostnames:
            - yeager.angelfish-ruler.ts.net
      containers:
        - name: actual-ai
          image: sakowicz/actual-ai:latest@sha256:f8706c63f75456e25c97aff8d87e87168dfa2782b9cea512f77cbc7f13e41b8c
          env:
            - name: ACTUAL_SERVER_URL
              value: "https://yeager.angelfish-ruler.ts.net:30506"
            - name: ACTUAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: actual-ai-env
                  key: ACTUAL_PASSWORD
            - name: ACTUAL_BUDGET_ID
              value: "052da80b-7c30-49e4-893b-fe40e3fde6f2"
            - name: CLASSIFICATION_SCHEDULE_CRON
              value: "0 */6 * * *"
            - name: LLM_PROVIDER
              value: "openai"
            - name: OPENAI_BASE_URL
              value: "https://opencode.ai/zen/v1"
            - name: OPENAI_MODEL
              valueFrom:
                secretKeyRef:
                  name: actual-ai-env
                  key: OPENAI_MODEL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: actual-ai-env
                  key: OPENAI_API_KEY
            - name: FEATURES
              value: '["classifyOnStartup","syncAccountsBeforeClassify","freeWebSearch","suggestNewCategories"]'
            - name: TZ
              value: "America/Anchorage"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "50m"

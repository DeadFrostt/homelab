apiVersion: v1
kind: ConfigMap
metadata:
  name: coturn-config
  namespace: matrix-coturn
data:
  turnserver.conf.tmpl: |
    # Identity
    realm=${TURN_REALM}
    server-name=${TURN_SERVER_NAME}
    fingerprint

    # Authentication (Synapse-compatible)
    use-auth-secret
    static-auth-secret=${COTURN_AUTH_SECRET}

    # Network
    listening-port=3478
    tls-listening-port=5349
    listening-ip=0.0.0.0
    external-ip=${TURN_EXTERNAL_IP}
    relay-ip=${TURN_RELAY_IP}
    min-port=49152
    max-port=65535

    # TLS
    cert=/etc/letsencrypt/live/${TURN_SERVER_NAME}/fullchain.pem
    pkey=/etc/letsencrypt/live/${TURN_SERVER_NAME}/privkey.pem
    no-sslv3
    no-tlsv1
    no-tlsv1_1

    # Logging
    log-file=stdout
    simple-log

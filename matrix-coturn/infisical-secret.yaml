apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: matrix-coturn-secrets
  namespace: matrix-coturn
spec:
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectId: "918f9022-50a0-455f-9ce4-640043263038"
        envSlug: "prod"
        secretsPath: "/"
        recursive: false
      credentialsRef:
        secretName: infisical-auth
        secretNamespace: infisical-operator
  managedSecretReference:
    secretName: matrix-coturn-env
    secretNamespace: matrix-coturn

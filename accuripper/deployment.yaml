apiVersion: apps/v1
kind: Deployment
metadata:
  name: accuripper
  namespace: accuripper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accuripper
  template:
    metadata:
      labels:
        app: accuripper
    spec: 
      containers:
        - name: accuripper
          image: ghcr.io/deadfrostt/accuweather-scraper:latest
          ports:
            - containerPort: 8787
              name: http
          env:
            - name: PORT
              value: "8787"
          livenessProbe:
            tcpSocket:
              port: 8787
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8787
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: accuripper
  namespace: accuripper
spec:
  selector:
    app: accuripper
  ports:
    - port: 8787
      targetPort: 8787
      nodePort: 30784
      name: http
  type: NodePort
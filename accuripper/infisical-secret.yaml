apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: accuripper-secrets
  namespace: accuripper
spec:
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectId: "bf945442-cabc-4006-a747-e752877aee6e"
        envSlug: "prod"
        secretsPath: "/"
        recursive: false
      credentialsRef:
        secretName: infisical-auth
        secretNamespace: infisical-operator
  managedSecretReference:
    secretName: accuripper-env
    secretNamespace: accuripper

apiVersion: apps/v1
kind: Deployment
metadata:
  name: poke-gate
  namespace: poke-gate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poke-gate
  template:
    metadata:
      labels:
        app: poke-gate
    spec:
      serviceAccountName: poke-gate-sa
      containers:
        - name: poke-gate
          image: node:20-slim@sha256:2cf067cfed83d5ea958367df9f966191a942351a2df77d6f0193e162b5febfc0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              apt-get update
              apt-get install -y --no-install-recommends curl ca-certificates procps
              rm -rf /var/lib/apt/lists/*
              ARCH=$(uname -m | sed 's/aarch64/arm64/; s/x86_64/amd64/')
              curl -fsSLO "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/${ARCH}/kubectl"
              install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
              rm kubectl
              # Stub xdg-open so the poke SDK's device-code login() flow doesn't
              # crash on the async spawn ENOENT in this headless container. The
              # stub exits 0 (pretending the browser opened), the SDK continues
              # polling, and the token gets saved once the user authorizes the
              # URL printed in `kubectl logs -f`.
              cat > /usr/local/bin/xdg-open <<'EOF'
#!/bin/sh
exit 0
EOF
              chmod +x /usr/local/bin/xdg-open
              mkdir -p /root/.config/poke
              export XDG_CONFIG_HOME=/root/.config
              npx -y poke login
              exec npx -y poke-gate --headless
          env:
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: XDG_CONFIG_HOME
              value: /root/.config
          envFrom:
            - secretRef:
                name: poke-gate-env
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: root-volume
              mountPath: /root
      volumes:
        - name: root-volume
          persistentVolumeClaim:
            claimName: poke-gate-pvc

apiVersion: apps/v1
kind: Deployment
metadata:
  name: poke-gate
  namespace: poke-gate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poke-gate
  template:
    metadata:
      labels:
        app: poke-gate
    spec:
      serviceAccountName: poke-gate-sa
      containers:
        - name: poke-gate
          image: node:20-slim@sha256:2cf067cfed83d5ea958367df9f966191a942351a2df77d6f0193e162b5febfc0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              apt-get update
              apt-get install -y --no-install-recommends curl ca-certificates procps
              rm -rf /var/lib/apt/lists/*
              ARCH=$(uname -m | sed 's/aarch64/arm64/; s/x86_64/amd64/')
              curl -fsSLO "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/${ARCH}/kubectl"
              install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
              rm kubectl
              # Stub xdg-open so the poke SDK's device-code login() flow doesn't
              # crash on the async spawn ENOENT in this headless container. The
              # stub exits 0 (pretending the browser opened), the SDK continues
              # polling, and the token gets saved once the user authorizes the
              # URL printed in `kubectl logs -f`.
              printf '#!/bin/sh\nexit 0\n' > /usr/local/bin/xdg-open
              chmod +x /usr/local/bin/xdg-open
              mkdir -p /root/.config/poke
              export XDG_CONFIG_HOME=/root/.config
              npx -y poke login
              # Start poke-gate in the background so we can probe Poke's MCP API
              # in parallel and log the raw activate-tunnel / sync-tools responses.
              npx -y poke-gate --headless > /tmp/poke-gate.log 2>&1 &
              POKE_GATE_PID=$!
              echo "poke-gate started, pid=$POKE_GATE_PID, waiting for tunnel..."
              # Wait for the connection id to appear in the log
              for i in $(seq 1 60); do
                CONN_ID=$(grep -oE 'Tunnel connected \([a-f0-9-]+\)' /tmp/poke-gate.log 2>/dev/null | head -1 | sed 's/Tunnel connected (//;s/)//')
                if [ -n "$CONN_ID" ]; then break; fi
                sleep 1
              done
              if [ -z "$CONN_ID" ]; then
                echo "TUNNEL DEBUG: no connection id after 60s"
                tail -50 /tmp/poke-gate.log
                kill $POKE_GATE_PID 2>/dev/null
                exit 1
              fi
              echo "TUNNEL DEBUG: connection id = $CONN_ID"
              TOKEN=$(cat /root/.config/poke/credentials.json | sed 's/.*"token":"\([^"]*\)".*/\1/')
              BASE="${POKE_API:-https://poke.com/api/v1}"
              cat > /tmp/probe.mjs <<EOF
const token = process.env.TOKEN;
const base = process.env.BASE;
const connId = process.env.CONN_ID;
const headers = { 'Authorization': \`Bearer \${token}\`, 'Content-Type': 'application/json' };
async function probe(label, method, path) {
  const url = \`\${base}\${path}\`;
  process.stdout.write(\`TUNNEL DEBUG: \${method} \${url}\\n\`);
  try {
    const r = await fetch(url, { method, headers });
    const text = await r.text();
    process.stdout.write(\`  status=\${r.status} content-type=\${r.headers.get('content-type')}\\n\`);
    process.stdout.write(\`  body: \${text.slice(0, 2000)}\\n\\n\`);
  } catch (e) {
    process.stdout.write(\`  ERROR: \${e.message}\\n\\n\`);
  }
}
await probe('get', 'GET', \`/mcp/connections/\${connId}\`);
await probe('activate', 'POST', \`/mcp/connections/\${connId}/activate-tunnel\`);
await probe('sync', 'POST', \`/mcp/connections/\${connId}/sync-tools\`);
await probe('whoami', 'GET', '/user/profile');
EOF
              CONN_ID="$CONN_ID" TOKEN="$TOKEN" BASE="$BASE" node /tmp/probe.mjs
              echo
              echo "TUNNEL DEBUG: poke-gate log so far:"
              tail -30 /tmp/poke-gate.log
              exec tail -f /tmp/poke-gate.log
          env:
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: XDG_CONFIG_HOME
              value: /root/.config
          envFrom:
            - secretRef:
                name: poke-gate-env
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: root-volume
              mountPath: /root
      volumes:
        - name: root-volume
          persistentVolumeClaim:
            claimName: poke-gate-pvc

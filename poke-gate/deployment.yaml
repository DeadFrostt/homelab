apiVersion: apps/v1
kind: Deployment
metadata:
  name: poke-gate
  namespace: poke-gate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poke-gate
  template:
    metadata:
      labels:
        app: poke-gate
    spec:
      serviceAccountName: poke-gate-sa
      containers:
        - name: poke-gate
          image: node:20-slim@sha256:3d0f05455dea2c82e2f76e7e2543964c30f6b7d673fc1a83286736d44fe4c41c
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              apt-get update
              apt-get install -y --no-install-recommends curl ca-certificates procps
              rm -rf /var/lib/apt/lists/*
              curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
              rm kubectl
              exec npx -y poke-gate --headless
          envFrom:
            - secretRef:
                name: poke-gate-env
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: root-volume
              mountPath: /root
      volumes:
        - name: root-volume
          persistentVolumeClaim:
            claimName: poke-gate-pvc

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: infisical-pg
  namespace: infisical
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:14.10

  primaryUpdateStrategy: unsupervised

  bootstrap:
    initdb:
      database: infisical
      owner: infisical
      secret:
        name: infisical-pg-app

  storage:
    size: 5Gi
    storageClass: local-path

  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 500m

  monitoring:
    enablePodMonitor: false

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: infisical
  namespace: infisical
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infisical
  template:
    metadata:
      labels:
        app: infisical
    spec:
      containers:
        - name: infisical
          image: infisical/infisical:latest@sha256:a6fac8b2927efa40995835593230f035f669b8f1184a4c2a86e255d69a896c6e
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: infisical-env
          livenessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              memory: "1Gi"
              cpu: "750m"
            requests:
              memory: "256Mi"
              cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: infisical
  namespace: infisical
spec:
  type: NodePort
  selector:
    app: infisical
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30820
      name: http

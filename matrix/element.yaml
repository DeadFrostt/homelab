apiVersion: apps/v1
kind: Deployment
metadata:
  name: element
  namespace: matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: element
  template:
    metadata:
      labels:
        app: element
    spec:
      initContainers:
        - name: render-config
          image: alpine:3.24@sha256:a2d49ea686c2adfe3c992e47dc3b5e7fa6e6b5055609400dc2acaeb241c829f4
          command:
            - sh
            - -c
            - |
              apk add --no-cache gettext >/dev/null
              envsubst < /tmp/tmpl/element-config.json.tmpl > /etc/element/config.json
          env:
            - name: MATRIX_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: matrix-env
                  key: MATRIX_BASE_URL
            - name: MATRIX_SERVER_NAME
              valueFrom:
                secretKeyRef:
                  name: matrix-env
                  key: MATRIX_SERVER_NAME
          volumeMounts:
            - name: config-tmpl
              mountPath: /tmp/tmpl
              readOnly: true
            - name: config-rendered
              mountPath: /etc/element
      containers:
        - name: element
          image: vectorim/element-web:latest@sha256:26546ef29e02a6e0978c137b7cc93581e6bbb94a5fe95104b89a216c43004d12
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: config-rendered
              mountPath: /app/config.json
              subPath: config.json
              readOnly: true
          resources:
            limits:
              memory: "128Mi"
              cpu: "200m"
            requests:
              memory: "32Mi"
              cpu: "25m"
      volumes:
        - name: config-tmpl
          configMap:
            name: element-config
        - name: config-rendered
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: element
  namespace: matrix
spec:
  type: NodePort
  selector:
    app: element
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30030

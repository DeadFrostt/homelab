apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: matrix-postgres
  namespace: matrix
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: matrix-secrets
  namespace: matrix
spec:
  hostAPI: https://__TAILSCALE_HOST__:8200/api
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectId: "5cd176d5-af00-4aa0-a4c7-9fca63fcbeab"
        envSlug: "prod"
        secretsPath: "/"
        recursive: false
      credentialsRef:
        secretName: infisical-auth
        secretNamespace: infisical-operator
  managedSecretReference:
    secretName: matrix-env
    secretNamespace: matrix

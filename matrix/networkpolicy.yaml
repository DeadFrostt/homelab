apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: matrix
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: matrix
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Postgres only accepts from Synapse
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
  namespace: matrix
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: synapse
      ports:
        - protocol: TCP
          port: 5432
---
# Synapse ingress + egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-synapse
  namespace: matrix
spec:
  podSelector:
    matchLabels:
      app: synapse
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8008
    - from:
        - podSelector:
            matchLabels:
              app: element
        - podSelector:
            matchLabels:
              app: synapse-admin
      ports:
        - protocol: TCP
          port: 8008
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - {}
---
# Element web ingress + egress (may call synapse APIs server-side)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-element
  namespace: matrix
spec:
  podSelector:
    matchLabels:
      app: element
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: synapse
      ports:
        - protocol: TCP
          port: 8008
    - {}
---
# Synapse admin ingress + egress (may call synapse APIs server-side)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-synapse-admin
  namespace: matrix
spec:
  podSelector:
    matchLabels:
      app: synapse-admin
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: synapse
      ports:
        - protocol: TCP
          port: 8008
    - {}
---
# Postgres egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-egress
  namespace: matrix
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Egress
  egress:
    - {}

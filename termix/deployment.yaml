apiVersion: apps/v1
kind: Deployment
metadata:
  name: termix
  namespace: termix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: termix
  template:
    metadata:
      labels:
        app: termix
    spec:
      containers:
        - name: termix
          image: ghcr.io/lukegus/termix:latest@sha256:06a27a3dc22ae426cf0681fcdbdb58732f2aab56d8ce9e95f4deea18306e5c2f
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: "256Mi"
              cpu: "200m"
            requests:
              memory: "64Mi"
              cpu: "25m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: termix-data
---
apiVersion: v1
kind: Service
metadata:
  name: termix
  namespace: termix
spec:
  selector:
    app: termix
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30100
      name: http
  type: NodePort

apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale
  namespace: cobalt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale
  namespace: cobalt
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "update", "patch", "create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale
  namespace: cobalt
subjects:
  - kind: ServiceAccount
    name: tailscale
    namespace: cobalt
roleRef:
  kind: Role
  name: tailscale
  apiGroup: rbac.authorization.k8s.io

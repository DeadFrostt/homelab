# HAProxy failover proxy. Replaces the docker-compose container that used
# 'network_mode: host' to reach localhost:19009 and localhost:19010.
#
# In k8s, we use DNS service names instead:
# - cobalt-primary:9000  (via ClusterIP service)
# - cobalt-backup:9000   (via ClusterIP service)
#
# The Service below uses NodePort, which exposes port 30009 on EVERY node
# in the cluster. Since you only have one node (yeager), you can reach it at:
#   http://yeager-tailscale-ip:30009
# Or on localhost:
#   http://127.0.0.1:30009
#
# Your existing 'tailscale serve --https=9009' on the host would then proxy to:
#   http://localhost:30009
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cobalt-proxy
  namespace: cobalt
  labels:
    app: cobalt-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cobalt-proxy
  template:
    metadata:
      labels:
        app: cobalt-proxy
    spec:
      containers:
        - name: haproxy
          image: haproxy:3.1-alpine@sha256:475863a372c92c3dab3d59eafbbf8019dceebcd0c456594551b160ecdba4bdb9
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
              readOnly: true
          ports:
            - containerPort: 9009
              name: proxy
          livenessProbe:
            tcpSocket:
              port: 9009
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 9009
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            limits:
              memory: "128Mi"
              cpu: "250m"
            requests:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: haproxy-config
          configMap:
            name: cobalt-haproxy
---
apiVersion: v1
kind: Service
metadata:
  name: cobalt-proxy
  namespace: cobalt
spec:
  selector:
    app: cobalt-proxy
  ports:
    - port: 9009
      targetPort: 9009
      nodePort: 30009   # Exposed on the host node
      name: proxy
  type: NodePort

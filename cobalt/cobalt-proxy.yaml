apiVersion: apps/v1
kind: Deployment
metadata:
  name: cobalt-proxy
  namespace: cobalt
  labels:
    app: cobalt-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cobalt-proxy
  template:
    metadata:
      labels:
        app: cobalt-proxy
    spec:
      containers:
        - name: haproxy
          image: haproxy:3.3-alpine@sha256:0b1bd52a831d0f0e0fb03a56e59fcd5c16b8e219b0e5f2eff388b40fd95b5d44
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
              readOnly: true
          ports:
            - containerPort: 9009
              name: proxy
          livenessProbe:
            tcpSocket:
              port: 9009
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 9009
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            limits:
              memory: "128Mi"
              cpu: "250m"
            requests:
              memory: "64Mi"
              cpu: "50m"
      volumes:
        - name: haproxy-config
          configMap:
            name: cobalt-haproxy
---
apiVersion: v1
kind: Service
metadata:
  name: cobalt-proxy
  namespace: cobalt
spec:
  selector:
    app: cobalt-proxy
  ports:
    - port: 9009
      targetPort: 9009
      nodePort: 30009
      name: proxy
  type: NodePort

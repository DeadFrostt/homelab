apiVersion: apps/v1
kind: Deployment
metadata:
  name: cobalt-primary
  namespace: cobalt
  labels:
    app: cobalt-primary
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cobalt-primary
  template:
    metadata:
      labels:
        app: cobalt-primary
    spec:
      securityContext:
        sysctls:
          - name: net.ipv4.ip_forward
            value: "1"
      serviceAccountName: tailscale
      containers:
        - name: tailscale
          image: tailscale/tailscale:latest@sha256:dbeff02d2337344b351afac203427218c4d0a06c43fc10a865184063498472a6
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          env:
            - name: TS_EXTRA_ARGS
              value: "--exit-node=__TAILSCALE_EXIT_IP__ --exit-node-allow-lan-access=true --accept-routes --accept-risk=linux-strict-rp-filter"
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: cobalt-env
                  key: TS_AUTHKEY
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
            - name: dev-net-tun
              mountPath: /dev/net/tun
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
        - name: cobalt-api
          image: ghcr.io/zimpatrick/cobalt:staging@sha256:7fd09b3e8a361fe1ded1cf6aa38e2be6d9dfbace37418b43125c930780cb7250
          env:
            - name: API_URL
              value: "https://cobalt.pleasedontdmca.me/"
            - name: CUSTOM_INNERTUBE_CLIENT
              value: "WEB_EMBEDDED"
            - name: COOKIE_PATH
              value: /cookies.json
          volumeMounts:
            - name: cobalt-files
              mountPath: /cookies.json
              subPath: cookies.json
            - name: cobalt-files
              mountPath: /keys.json
              subPath: keys.json
              readOnly: true
          ports:
            - containerPort: 9000
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 2
          readinessProbe:
            httpGet:
              path: /
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: "512Mi"
              cpu: "1000m"
            requests:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: tailscale-state
          persistentVolumeClaim:
            claimName: tailscale-state
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: cobalt-files
          secret:
            secretName: cobalt-files
---
apiVersion: v1
kind: Service
metadata:
  name: cobalt-primary
  namespace: cobalt
spec:
  selector:
    app: cobalt-primary
  ports:
    - port: 9000
      targetPort: 9000
      name: http
  type: ClusterIP

# ConfigMaps are for non-sensitive configuration files.
# Think of them as bind mounts, but stored in the k8s API instead of the filesystem.
# We mount this inside the HAProxy container at /usr/local/etc/haproxy/haproxy.cfg
#
# KEY CHANGE from docker-compose: instead of 127.0.0.1:19009 and 127.0.0.1:19010,
# we use k8s DNS service names. In a cluster, 'cobalt-primary' and 'cobalt-backup'
# resolve to the ClusterIP of those services automatically.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cobalt-haproxy
  namespace: cobalt
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
      maxconn 2000

    defaults
      log global
      mode http
      option httplog
      option httpchk GET /
      timeout connect 5s
      timeout client 30s
      timeout server 30s
      retries 2

    frontend cobalt_front
      bind *:9009
      default_backend cobalt_backends

    backend cobalt_backends
      balance first
      option httpchk GET /
      http-check expect status 200
      default-server inter 2s fall 2 rise 2 on-marked-down shutdown-sessions
      # Primary path (tailscale-backed cobalt)
      server primary cobalt-primary:9000 check
      # Fallback path (gluetun-backed cobalt)
      server fallback cobalt-backup:9000 check backup

apiVersion: v1
kind: ConfigMap
metadata:
  name: cobalt-haproxy
  namespace: cobalt
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
      maxconn 2000

    defaults
      log global
      mode http
      option httplog
      option httpchk GET /
      timeout connect 5s
      timeout client 30s
      timeout server 30s
      retries 2

    frontend cobalt_front
      bind *:9009
      default_backend cobalt_backends

    backend cobalt_backends
      balance first
      option httpchk GET /
      http-check expect status 200
      default-server inter 2s fall 2 rise 2 on-marked-down shutdown-sessions
      server primary cobalt-primary:9000 check
      server fallback cobalt-backup:9000 check backup

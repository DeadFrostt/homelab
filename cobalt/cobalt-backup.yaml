apiVersion: apps/v1
kind: Deployment
metadata:
  name: cobalt-backup
  namespace: cobalt
  labels:
    app: cobalt-backup
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cobalt-backup
  template:
    metadata:
      labels:
        app: cobalt-backup
    spec:
      initContainers:
        - name: fix-ipv6
          image: busybox:latest@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            privileged: true
          command: ["sh", "-c", "ip -6 rule del from all to all table 51820 2>/dev/null || true"]
      containers:
        - name: gluetun
          image: qmcgaw/gluetun@sha256:b0ee2135e6ba52ad3f102aae9663707cd1c9531485117067a380d3b2b6dd991d
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            privileged: true
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "custom"
            - name: VPN_TYPE
              value: "wireguard"
            - name: BLOCK_IPV6
              value: "on"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.0.0.0/24,10.42.0.0/16,10.43.0.0/16"
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: cobalt-env
                  key: WIREGUARD_PRIVATE_KEY
            - name: WIREGUARD_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: cobalt-env
                  key: WIREGUARD_PUBLIC_KEY
            - name: WIREGUARD_ADDRESSES
              valueFrom:
                secretKeyRef:
                  name: cobalt-env
                  key: WIREGUARD_ADDRESSES
            - name: WIREGUARD_ENDPOINT_IP
              valueFrom:
                secretKeyRef:
                  name: cobalt-env
                  key: WIREGUARD_ENDPOINT_IP
            - name: WIREGUARD_ENDPOINT_PORT
              valueFrom:
                secretKeyRef:
                  name: cobalt-env
                  key: WIREGUARD_ENDPOINT_PORT
            - name: WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL
              valueFrom:
                secretKeyRef:
                  name: cobalt-env
                  key: WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL
          volumeMounts:
            - name: dev-net-tun
              mountPath: /dev/net/tun
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "25m"
        - name: cobalt-api
          image: ghcr.io/zimpatrick/cobalt:staging@sha256:a4357be1523b1c2823873c53db0270c67e6f71856c4eaf22f8d62205da372bb8
          env:
            - name: API_URL
              value: "https://cobalt.pleasedontdmca.me/"
            - name: CUSTOM_INNERTUBE_CLIENT
              value: "WEB_EMBEDDED"
            - name: COOKIE_PATH
              value: /cookies.json
          volumeMounts:
            - name: cobalt-files
              mountPath: /cookies.json
              subPath: cookies.json
            - name: cobalt-files
              mountPath: /keys.json
              subPath: keys.json
              readOnly: true
          ports:
            - containerPort: 9000
              name: http
          livenessProbe:
            exec:
              command: ["wget", "-q", "-O-", "--timeout=4", "http://127.0.0.1:9000/"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["wget", "-q", "-O-", "--timeout=4", "http://127.0.0.1:9000/"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: "512Mi"
              cpu: "750m"
            requests:
              memory: "256Mi"
              cpu: "50m"
      volumes:
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: cobalt-files
          secret:
            secretName: cobalt-files
---
apiVersion: v1
kind: Service
metadata:
  name: cobalt-backup
  namespace: cobalt
spec:
  selector:
    app: cobalt-backup
  ports:
    - port: 9000
      targetPort: 9000
      name: http
  type: ClusterIP

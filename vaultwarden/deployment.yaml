apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  replicas: 1
  # sqlite data dir can't be shared between two pods on a RWO PVC
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vaultwarden
  template:
    metadata:
      labels:
        app: vaultwarden
    spec:
      containers:
        - name: vaultwarden
          image: vaultwarden/server:latest@sha256:d626d04934cd1192ad8ced1adb975099fca78cec33ab467d2d3c923cde7f3b0c
          ports:
            - containerPort: 80
              name: http
          env:
            - name: DOMAIN
              value: "https://vault.deadfrost.dev"
            - name: ROCKET_PORT
              value: "80"
            - name: SIGNUPS_ALLOWED
              value: "false"
            - name: INVITATIONS_ALLOWED
              value: "true"
            - name: WEB_VAULT_ENABLED
              value: "true"
            - name: WEBSOCKET_ENABLED
              value: "true"
            - name: SENDS_ALLOWED
              value: "true"
            - name: EMERGENCY_ACCESS_ALLOWED
              value: "true"
            - name: PASSWORD_HINTS_ALLOWED
              value: "false"
            - name: SHOW_PASSWORD_HINT
              value: "false"
            - name: TZ
              value: "America/Anchorage"
            - name: LOG_LEVEL
              value: "warn"
            - name: SMTP_PORT
              value: "2525"
            - name: SMTP_SECURITY
              value: "starttls"
            - name: SMTP_FROM_NAME
              value: "Vaultwarden"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-env
                  key: ADMIN_TOKEN
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-env
                  key: SMTP_HOST
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-env
                  key: SMTP_FROM
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-env
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vaultwarden-env
                  key: SMTP_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /alive
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "50m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultwarden-data
---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  selector:
    app: vaultwarden
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30222
      name: http
  type: NodePort

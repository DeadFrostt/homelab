name: Validate manifests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  KUSTOMIZE_VERSION: v5.8.1
  KUBECONFORM_VERSION: v0.8.0

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install kustomize
        run: |
          curl -sSLf "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            | sudo tar xz -C /usr/local/bin kustomize
          kustomize version

      - name: Install kubeconform
        run: |
          curl -sSLf "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | sudo tar xz -C /usr/local/bin kubeconform
          kubeconform -v

      # helm is preinstalled on ubuntu-latest runners; --enable-helm needs it for
      # the velero / cnpg-system / infisical-operator charts.
      - name: Build (kustomize) and validate (kubeconform)
        run: ./.github/validate-manifests.sh

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.14.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

credentials:
  useSecret: true
  existingSecret: velero-cloud-credentials

configuration:
  defaultBackupStorageLocation: default
  defaultVolumesToFsBackup: false
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: k3s-backups-yeager
      default: true
      accessMode: ReadWrite
      credential:
        name: velero-cloud-credentials
        key: cloud
      config:
        region: us-east-005
        s3ForcePathStyle: "true"
        s3Url: https://s3.us-east-005.backblazeb2.com
  volumeSnapshotLocation: []

snapshotsEnabled: false
deployNodeAgent: true
upgradeCRDs: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeAgent:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

schedules:
  daily-cluster:
    disabled: false
    schedule: "23 8 * * *"
    useOwnerReferencesInBackup: false
    template:
      ttl: "336h"
      storageLocation: default
      includedNamespaces:
        - authentik
        - couch-db
        - degoog
        - infisical
        - matrix
        - mealie
        - pelican
        - termix
        - vaultwarden
        - zipline
      defaultVolumesToFsBackup: true
      snapshotVolumes: false

initContainers:
  - name: velero-plugin-for-aws
    # Pinned to v1.13.2: v1.14.x regressed an unconditional x-amz-tagging header
    # that strict S3-compatible stores (Backblaze B2) reject with a 400, failing
    # the velero-backup.json metadata write. See velero #9931 / #9804, fix in
    # plugin PR #299 (unreleased). Re-pin forward once a release past v1.14.2 ships.
    image: velero/velero-plugin-for-aws:v1.13.2@sha256:25c3a0a043fc396a0593a3da0aa16ed1f39df74883bda42c4588fc8877b72bde
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

credentials:
  useSecret: true
  existingSecret: velero-cloud-credentials

configuration:
  defaultBackupStorageLocation: default
  defaultVolumesToFsBackup: false
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: k3s-backups-yeager
      default: true
      accessMode: ReadWrite
      credential:
        name: velero-cloud-credentials
        key: cloud
      config:
        region: us-east-005
        s3ForcePathStyle: "true"
        s3Url: https://s3.us-east-005.backblazeb2.com
  volumeSnapshotLocation: []

snapshotsEnabled: false
deployNodeAgent: true
upgradeCRDs: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeAgent:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

schedules:
  daily-cluster:
    disabled: false
    schedule: "23 8 * * *"
    useOwnerReferencesInBackup: false
    template:
      ttl: "336h"
      storageLocation: default
      includedNamespaces:
        - actual-budget
        - authentik
        - couch-db
        - degoog
        - infisical
        - matrix
        - mealie
        - pelican
        - termix
        - vaultwarden
        - zipline
      defaultVolumesToFsBackup: true
      snapshotVolumes: false

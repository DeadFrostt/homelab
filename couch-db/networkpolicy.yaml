apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: couch-db
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: couch-db
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Cloudflared uses hostNetwork, so it gets allow-all
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared
  namespace: couch-db
spec:
  podSelector:
    matchLabels:
      app: cloudflared
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - {}
---
# CouchDB only accepts from cloudflared (and user browsers via cloudflared)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-couchdb
  namespace: couch-db
spec:
  podSelector:
    matchLabels:
      app: obsidian-livesync
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: cloudflared
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gatus
          podSelector:
            matchLabels:
              app: gatus
      ports:
        - protocol: TCP
          port: 5984
  egress:
    - {}

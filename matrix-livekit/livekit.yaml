apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  namespace: matrix-livekit
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: yeager
      initContainers:
        - name: render-config
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              apk add --no-cache gettext >/dev/null
              envsubst < /tmp/tmpl/config.yaml.tmpl > /etc/livekit/config.yaml
              echo "rendered config:"
              sed 's/\(["'\'']\)[^"'\'']*\(["'\'']\)/\1***\2/g' /etc/livekit/config.yaml
          env:
            - name: LIVEKIT_KEY
              valueFrom:
                secretKeyRef:
                  name: matrix-livekit-env
                  key: LIVEKIT_KEY
            - name: LIVEKIT_SECRET
              valueFrom:
                secretKeyRef:
                  name: matrix-livekit-env
                  key: LIVEKIT_SECRET
          volumeMounts:
            - name: config-tmpl
              mountPath: /tmp/tmpl
              readOnly: true
            - name: config-rendered
              mountPath: /etc/livekit
      containers:
        - name: livekit
          image: livekit/livekit-server:latest@sha256:b617bb3363f13e880a82164692d842681276bc6eed7da46092f9ddb22017b927
          args: ["--config", "/etc/livekit/config.yaml"]
          volumeMounts:
            - name: config-rendered
              mountPath: /etc/livekit
              readOnly: true
          resources:
            limits:
              memory: "1Gi"
              cpu: "1000m"
            requests:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: config-tmpl
          configMap:
            name: livekit-config
        - name: config-rendered
          emptyDir: {}

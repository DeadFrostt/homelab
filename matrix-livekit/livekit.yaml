apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  namespace: matrix-livekit
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: yeager
      initContainers:
        - name: render-config
          image: alpine:3.24@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
          command:
            - sh
            - -c
            - |
              sed -e "s|\${LIVEKIT_KEY}|${LIVEKIT_KEY}|g" \
                  -e "s|\${LIVEKIT_SECRET}|${LIVEKIT_SECRET}|g" \
                  /tmp/tmpl/config.yaml.tmpl > /etc/livekit/config.yaml
              echo "rendered config:"
              sed 's/\(["'\'']\)[^"'\'']*\(["'\'']\)/\1***\2/g' /etc/livekit/config.yaml
          env:
            - name: LIVEKIT_KEY
              valueFrom:
                secretKeyRef:
                  name: matrix-livekit-env
                  key: LIVEKIT_KEY
            - name: LIVEKIT_SECRET
              valueFrom:
                secretKeyRef:
                  name: matrix-livekit-env
                  key: LIVEKIT_SECRET
          volumeMounts:
            - name: config-tmpl
              mountPath: /tmp/tmpl
              readOnly: true
            - name: config-rendered
              mountPath: /etc/livekit
      containers:
        - name: livekit
          image: livekit/livekit-server:latest@sha256:189f7c81b704a36642bc5c7e2d3e1ae83744627c11978a23a251bf19fbec64e0
          args: ["--config", "/etc/livekit/config.yaml"]
          volumeMounts:
            - name: config-rendered
              mountPath: /etc/livekit
              readOnly: true
          resources:
            limits:
              memory: "384Mi"
              cpu: "750m"
            requests:
              memory: "128Mi"
              cpu: "50m"
      volumes:
        - name: config-tmpl
          configMap:
            name: livekit-config
        - name: config-rendered
          emptyDir: {}

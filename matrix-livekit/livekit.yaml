apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  namespace: matrix-livekit
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: yeager
      initContainers:
        - name: render-config
          image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
          command:
            - sh
            - -c
            - |
              sed -e "s|\${LIVEKIT_KEY}|${LIVEKIT_KEY}|g" \
                  -e "s|\${LIVEKIT_SECRET}|${LIVEKIT_SECRET}|g" \
                  /tmp/tmpl/config.yaml.tmpl > /etc/livekit/config.yaml
              echo "rendered config:"
              sed 's/\(["'\'']\)[^"'\'']*\(["'\'']\)/\1***\2/g' /etc/livekit/config.yaml
          env:
            - name: LIVEKIT_KEY
              valueFrom:
                secretKeyRef:
                  name: matrix-livekit-env
                  key: LIVEKIT_KEY
            - name: LIVEKIT_SECRET
              valueFrom:
                secretKeyRef:
                  name: matrix-livekit-env
                  key: LIVEKIT_SECRET
          volumeMounts:
            - name: config-tmpl
              mountPath: /tmp/tmpl
              readOnly: true
            - name: config-rendered
              mountPath: /etc/livekit
      containers:
        - name: livekit
          image: livekit/livekit-server:latest@sha256:100b9a870616d02f5e3795b34e0b593b5054a26f8131a94fd3fa322ed3154b16
          args: ["--config", "/etc/livekit/config.yaml"]
          volumeMounts:
            - name: config-rendered
              mountPath: /etc/livekit
              readOnly: true
          resources:
            limits:
              memory: "1Gi"
              cpu: "750m"
            requests:
              memory: "128Mi"
              cpu: "50m"
      volumes:
        - name: config-tmpl
          configMap:
            name: livekit-config
        - name: config-rendered
          emptyDir: {}

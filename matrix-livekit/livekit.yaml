apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  namespace: matrix-livekit
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: livekit
  template:
    metadata:
      labels:
        app: livekit
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: yeager
      initContainers:
        - name: render-config
          image: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
          command:
            - sh
            - -c
            - |
              sed -e "s|\${LIVEKIT_KEY}|${LIVEKIT_KEY}|g" \
                  -e "s|\${LIVEKIT_SECRET}|${LIVEKIT_SECRET}|g" \
                  /tmp/tmpl/config.yaml.tmpl > /etc/livekit/config.yaml
              echo "rendered config:"
              sed 's/\(["'\'']\)[^"'\'']*\(["'\'']\)/\1***\2/g' /etc/livekit/config.yaml
          env:
            - name: LIVEKIT_KEY
              valueFrom:
                secretKeyRef:
                  name: matrix-livekit-env
                  key: LIVEKIT_KEY
            - name: LIVEKIT_SECRET
              valueFrom:
                secretKeyRef:
                  name: matrix-livekit-env
                  key: LIVEKIT_SECRET
          volumeMounts:
            - name: config-tmpl
              mountPath: /tmp/tmpl
              readOnly: true
            - name: config-rendered
              mountPath: /etc/livekit
      containers:
        - name: livekit
          image: livekit/livekit-server:latest@sha256:2c6869d2d5ff6c9c0166f47be1c92dad6928bfecfa5e4060a6ece48db8accfa3
          args: ["--config", "/etc/livekit/config.yaml"]
          volumeMounts:
            - name: config-rendered
              mountPath: /etc/livekit
              readOnly: true
          resources:
            limits:
              memory: "1Gi"
              cpu: "750m"
            requests:
              memory: "128Mi"
              cpu: "50m"
      volumes:
        - name: config-tmpl
          configMap:
            name: livekit-config
        - name: config-rendered
          emptyDir: {}

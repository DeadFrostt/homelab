apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-config
  namespace: matrix-livekit
data:
  config.yaml.tmpl: |
    port: 7880
    bind_addresses:
      - "0.0.0.0"
    rtc:
      tcp_port: 7881
      port_range_start: 50100
      port_range_end: 50200
    room:

      auto_create: false
    logging:
      level: info
    turn:
      enabled: false
      domain: localhost
      cert_file: ""
      key_file: ""
      tls_port: 5349
      udp_port: 443
      external_tls: true
    keys:
      ${LIVEKIT_KEY}: "${LIVEKIT_SECRET}"

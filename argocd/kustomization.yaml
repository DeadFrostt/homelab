apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.3/manifests/install.yaml
  - applicationset.yaml
  - cmp-plugin-cm.yaml
patches:
  - path: server-nodeport.yaml
    target:
      kind: Service
      name: argocd-server
  - path: repo-server-patch.yaml
    target:
      kind: Deployment
      name: argocd-repo-server

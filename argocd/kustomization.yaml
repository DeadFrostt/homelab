apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.2/manifests/install.yaml
  - applicationset.yaml
patches:
  - path: server-nodeport.yaml
    target:
      kind: Service
      name: argocd-server
